<!DOCTYPE html>
<html>
<head>
    <title>Form Submission History</title>
    <style>
        body {
            background-color: #6a5acd;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            color: #000;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .return-btn {
            display: inline-block;
            background-color: #0c120c;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            margin: 20px 0;
        }
        .button-container {
            text-align: center;
        }
        .status-approved {
            background-color: #14e71b;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .status-rejected {
            background-color: #ff4444;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <a href="/admin" class="return-btn">Back to Admin</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Form Type</th>
                <th>Status</th>
                <th>Reviewed By</th>
            </tr>
        </thead>
        <tbody>
            {% for entry in history %}
            <tr>
                <td>{{ entry.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
                <td>{{ entry.form_type }}</td>
                <td>
                    <span class="status-{{ entry.status }}">
                        {{ entry.status|title }}
                    </span>
                </td>
                <td>{{ entry.reviewed_by }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align: center;">No form submissions found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
